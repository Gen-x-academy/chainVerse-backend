name: Backup and Restore Drill

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup-restore:
    name: Backup integrity check
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd 'mongosh --eval "db.adminCommand(\"ping\")"'
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed data
        run: npm run seed
        env:
          MONGO_URI: mongodb://localhost:27017/chainverse_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run backup drill
        run: bash scripts/backup-restore-drill.sh verify

